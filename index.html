<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Balance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #EFEAE0;
    --paper-2: #E6E0D2;
    --ink: #2B2A24;
    --ink-soft: #5A5748;
    --moss: #5B6E4F;
    --moss-soft: #E3E8DC;
    --ochre: #B9822F;
    --ochre-soft: #F3E6CE;
    --brick: #9C4A3B;
    --brick-soft: #F1DFDA;
    --teal: #2F6E63;
    --teal-soft: #DEEAE7;
    --line: rgba(43,42,36,0.14);
    --shadow: 0 2px 10px rgba(43,42,36,0.08);
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; }
  input, select, textarea{ font-size: 16px !important; } /* evita zoom automático do iOS ao focar campos */
  input[type="checkbox"]{
    -webkit-appearance: none; appearance: none;
    width: 19px; height: 19px; min-width: 19px; flex-shrink: 0;
    border: 1.5px solid var(--line); border-radius: 5px;
    background: #fff; cursor: pointer; position: relative;
    margin: 0; vertical-align: middle;
  }
  input[type="checkbox"]:checked{ background: var(--teal); border-color: var(--teal); }
  input[type="checkbox"]:checked::after{
    content: ''; position: absolute; left: 6px; top: 2px;
    width: 5px; height: 10px; border: solid #fff; border-width: 0 2px 2px 0;
    transform: rotate(45deg);
  }
  body{
    background:
      radial-gradient(circle at 15% 20%, rgba(91,110,79,0.05) 0, transparent 45%),
      radial-gradient(circle at 85% 75%, rgba(156,74,59,0.04) 0, transparent 50%),
      repeating-radial-gradient(circle at 50% 0%, transparent 0, transparent 60px, rgba(43,42,36,0.025) 61px),
      var(--paper);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 28px 16px 60px;
  }
  .wrap{ max-width: 780px; margin: 0 auto; }

  header{ margin-bottom: 22px; }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin: 0 0 6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 34px;
    margin: 0 0 6px;
    letter-spacing: -0.01em;
  }
  .sub{ color: var(--ink-soft); font-size: 14.5px; margin: 0; max-width: 54ch; }

  /* ---- Trail nav ---- */
  .trail{ position: relative; margin: 30px 0 24px; }
  .trail-path{
    position: absolute;
    top: 17px; left: 22px; right: 22px;
    height: 2px;
    background: repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 11px);
    z-index: 0;
  }
  .trail-row{
    display:flex; justify-content: space-between; position: relative; z-index: 1;
  }
  .waypoint{
    display:flex; flex-direction:column; align-items:center; gap:7px;
    background:none; border:none; cursor:pointer; padding:0; flex: 1;
    font-family: inherit;
  }
  .dot{
    width: 34px; height: 34px; border-radius: 50%;
    background: var(--paper-2);
    border: 2px solid var(--line);
    display:flex; align-items:center; justify-content:center;
    font-family:'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-soft);
    transition: all .15s ease;
  }
  .dot.status-verde{ background: var(--moss); border-color: var(--moss); color: #fff; }
  .dot.status-amarelo{ background: var(--ochre); border-color: var(--ochre); color: #fff; }
  .dot.status-vermelho{ background: var(--brick); border-color: var(--brick); color: #fff; }
  .waypoint.active .dot{ box-shadow: 0 0 0 4px rgba(47,110,99,0.15); border-color: var(--teal); }
  .waypoint .label{ font-size: 11.5px; color: var(--ink-soft); letter-spacing: 0.02em; }
  .waypoint.active .label{ color: var(--ink); font-weight: 600; }
  .waypoint .today-mark{ font-size: 9px; font-family:'IBM Plex Mono', monospace; color: var(--teal); letter-spacing: 0.08em; }

  .tabs-secondary{ display:flex; gap: 8px; margin-bottom: 22px; }
  .tab-btn{
    font-family:'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.04em;
    padding: 10px 14px; border-radius: 20px; border: 1px solid var(--line);
    background: transparent; color: var(--ink-soft); cursor:pointer; line-height:1.3;
  }
  .tab-btn.active{ background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* ---- Card ---- */
  .card{
    background: #fff; border-radius: 14px; box-shadow: var(--shadow);
    padding: 24px 26px; border: 1px solid var(--line);
  }
  .card-head{ display:flex; justify-content: space-between; align-items:flex-start; gap: 14px; margin-bottom: 6px; flex-wrap: wrap; }
  .card-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-soft); text-transform:uppercase; letter-spacing:0.1em; margin:0 0 4px; }
  .card-title{ font-family:'Fraunces', serif; font-weight: 600; font-size: 24px; margin: 0; }
  .card-focus{ color: var(--ink-soft); font-size: 14px; margin: 4px 0 0; }

  .segctl{ display:flex; gap: 8px; margin: 18px 0 4px; flex-wrap: wrap; }
  .seg-btn{
    flex: 1; min-width: 108px; display:flex; align-items:center; gap: 9px;
    padding: 10px 13px; border-radius: 12px; border: 1.5px solid var(--line);
    background: #fff; cursor: pointer; text-align:left; transition: all .15s ease;
  }
  .seg-btn:hover{ border-color: var(--ink-soft); }
  .seg-dot{ width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: var(--line); }
  .seg-verde .seg-dot{ background: var(--moss); }
  .seg-amarelo .seg-dot{ background: var(--ochre); }
  .seg-vermelho .seg-dot{ background: var(--brick); }
  .seg-text{ display:flex; flex-direction:column; line-height:1.3; }
  .seg-label{ font-size: 13px; font-weight: 600; color: var(--ink-soft); }
  .seg-sub{ font-size: 10.5px; color: var(--ink-soft); opacity:.75; }
  .seg-btn.selected{ box-shadow: 0 1px 3px rgba(43,42,36,0.08); }
  .seg-btn.selected .seg-label{ color: var(--ink); }
  .seg-btn.selected.seg-verde{ background: var(--moss-soft); border-color: var(--moss); }
  .seg-btn.selected.seg-amarelo{ background: var(--ochre-soft); border-color: var(--ochre); }
  .seg-btn.selected.seg-vermelho{ background: var(--brick-soft); border-color: var(--brick); }

  .status-note{
    margin: 14px 0 0; padding: 10px 14px; border-radius: 10px;
    font-size: 13.5px; line-height: 1.5;
  }
  .status-note.verde{ background: var(--moss-soft); color: #3B4A32; }
  .status-note.amarelo{ background: var(--ochre-soft); color: #6E4D1B; }
  .status-note.vermelho{ background: var(--brick-soft); color: #6B2F24; }

  .mood-row{ display:flex; gap: 10px; flex-wrap: wrap; margin-top: 10px; }
  .mood-btn{
    width: 46px; height: 46px; border-radius: 50%; display:flex; align-items:center; justify-content:center;
    border: 1.5px solid var(--line); background: var(--paper); cursor: pointer; padding: 0;
    transition: all .15s ease;
  }
  .mood-icon{ font-size: 21px; line-height:1; filter: grayscale(1) opacity(0.55); }
  .mood-btn.selected{ background: var(--mood-color); border-color: var(--mood-color); box-shadow: 0 0 0 3px rgba(47,110,99,0.12); }
  .mood-btn.selected .mood-icon{ filter: none; }

  .cycle-banner{ background: var(--paper-2); border-radius: 12px; padding: 14px 16px; margin: 0 0 20px; }

  .group-label{
    font-family:'IBM Plex Mono', monospace; font-size: 11px; text-transform: uppercase;
    letter-spacing: 0.08em; color: var(--ink-soft); margin: 22px 0 10px;
    display:flex; justify-content:space-between; align-items:baseline;
  }
  ul.ex-list{ list-style:none; margin:0; padding:0; }
  ul.ex-list li{
    display:flex; justify-content: space-between; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 14.5px;
  }
  ul.ex-list li:last-child{ border-bottom: none; }
  .ex-name{ font-weight: 500; }
  .ex-sets{ font-family:'IBM Plex Mono', monospace; font-size: 13px; color: var(--ink-soft); white-space:nowrap; }

  .cardio-tag{
    display:inline-block; margin-top:16px; padding: 8px 12px; border-radius: 8px;
    background: var(--paper-2); font-size: 13px; color: var(--ink-soft);
  }
  .rest-block{ text-align:center; padding: 26px 10px; }
  .rest-block .big{ font-family:'Fraunces', serif; font-size: 22px; margin-bottom: 6px; }

  .hint{ font-size: 12px; color: var(--ink-soft); margin-top: 8px; }

  /* ---- Painel ---- */
  .stat-grid{ display:grid; grid-template-columns: repeat(auto-fit, minmax(128px,1fr)); gap: 12px; margin: 18px 0 20px; }
  .stat{ background: var(--paper-2); border-radius: 12px; padding: 13px 15px; }
  .stat .num{ font-family:'IBM Plex Mono', monospace; font-size: 23px; font-weight: 600; }
  .stat .lbl{ font-size: 11.5px; color: var(--ink-soft); margin-top: 2px; }

  .gentle{ background: var(--moss-soft); border-radius: 12px; padding: 14px 16px; font-size: 13.5px; color: #3B4A32; margin-bottom: 18px; }

  .config-row{ display:flex; gap: 20px; flex-wrap:wrap; background: var(--paper-2); border-radius: 12px; padding: 12px 16px; margin-bottom: 20px; }
  .config-field{ display:flex; align-items:center; gap: 8px; }
  .config-field label{ font-size: 12.5px; color: var(--ink-soft); }
  .config-field input{ width: 76px; font-family:'IBM Plex Mono', monospace; border: 1px solid var(--line); border-radius: 7px; padding: 5px 8px; font-size: 13px; background: #fff; }

  .form-grid{ display:grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 6px; }
  .field label{ display:block; font-size: 12.5px; color: var(--ink-soft); margin-bottom: 5px; }
  .field input:not([type="checkbox"]), .field select{
    width:100%; font-family:'IBM Plex Mono', monospace; border: 1px solid var(--line);
    border-radius: 8px; padding: 9px 10px; font-size: 14px; background: var(--paper);
  }
  .field.full{ grid-column: 1 / -1; }

  /* water */
  .water-row{ display:flex; align-items:center; gap: 14px; flex-wrap: wrap; margin: 10px 0 4px; }
  .bottles{ display:flex; gap: 8px; }
  .bottle-btn{ background:none; border:none; cursor:pointer; padding:0; color: var(--line); }
  .bottle-btn.filled{ color: var(--teal); }
  .bottle-btn svg{ width: 22px; height: 36px; display:block; }
  .water-total{ font-family:'IBM Plex Mono', monospace; font-size: 13.5px; color: var(--ink-soft); }

  /* meals */
  .meal-card{ border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; margin-bottom: 14px; }
  .meal-head{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom: 10px; }
  .meal-title{ font-weight: 600; font-size: 14.5px; }
  .meal-kcal{ font-family:'IBM Plex Mono', monospace; font-size: 13px; color: var(--teal); font-weight: 600; }
  .chips{ display:flex; flex-wrap:wrap; gap: 7px; margin-bottom: 10px; }
  .chip{
    font-family:'IBM Plex Mono', monospace; font-size: 11.5px; padding: 6px 10px; border-radius: 16px;
    border: 1px solid var(--line); background: var(--paper); cursor:pointer; color: var(--ink-soft); white-space:nowrap;
  }
  .chip:hover{ border-color: var(--teal); color: var(--teal); }
  .item-list{ margin-bottom: 8px; }
  .item-row{ display:flex; align-items:center; gap: 8px; font-size: 13.5px; padding: 6px 0; border-bottom: 1px dashed var(--line); flex-wrap: wrap; }
  .item-row:last-child{ border-bottom:none; }
  .item-name{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .item-kcal{ font-family:'IBM Plex Mono', monospace; font-size: 12.5px; color: var(--ink-soft); white-space:nowrap; }
  .item-x{ background:none; border:none; color: var(--brick); cursor:pointer; font-size: 15px; line-height:1; padding: 0 2px; }

  .item-check-label{ display:flex; align-items:center; gap:8px; flex:1 1 160px; min-width:0; cursor:pointer; }
  .item-name-wrap{ flex:1; min-width:0; overflow:hidden; }
  .plan-sel{
    width:100%; max-width:100%; box-sizing:border-box;
    font-family:'IBM Plex Mono', monospace; font-size:12.5px;
    border:1px solid var(--line); border-radius:6px; padding:5px 6px; background:var(--paper);
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .item-meta{ display:flex; align-items:center; gap:8px; flex-shrink:0; margin-left:auto; }
  .qty-box{ display:flex; align-items:center; gap:4px; font-size:12px; color:var(--ink-soft); white-space:nowrap; }
  .plan-qty{ width:52px; font-family:'IBM Plex Mono',monospace; border:1px solid var(--line); border-radius:6px; padding:5px 6px; background:var(--paper); box-sizing:border-box; }
  .qty-unit{ font-size:12px; color:var(--ink-soft); }
  .custom-add{ display:flex; gap: 6px; margin-top: 8px; flex-wrap:wrap; }
  .custom-add input{ font-family:'IBM Plex Mono', monospace; border: 1px solid var(--line); border-radius: 7px; padding: 6px 8px; font-size: 12.5px; background: var(--paper); }
  .custom-add input.iname{ flex: 1; min-width: 120px; }
  .custom-add input.ikcal{ width: 74px; }
  .custom-add button{ font-family: 'Inter'; font-size: 12.5px; font-weight:600; background: var(--teal); color:#fff; border:none; border-radius: 7px; padding: 6px 12px; cursor:pointer; }
  .obs-field{ margin-top: 10px; }
  .obs-field input{ width:100%; font-family:'Inter'; border: 1px solid var(--line); border-radius: 7px; padding: 7px 9px; font-size: 13px; background: var(--paper); }

  .kcal-progress-wrap{ margin: 6px 0 22px; }
  .kcal-progress-bar{ height: 8px; border-radius: 6px; background: var(--paper-2); overflow:hidden; margin-top: 6px; }
  .kcal-progress-fill{ height: 100%; background: var(--teal); border-radius: 6px; transition: width .2s ease; }
  .kcal-progress-num{ font-family:'IBM Plex Mono', monospace; font-size: 13.5px; }

  .entries{ margin-top: 6px; }
  .entry-row{ display:flex; gap: 10px; align-items:center; font-size: 12.5px; padding: 8px 0; border-bottom: 1px solid var(--line); color: var(--ink-soft); flex-wrap: wrap; }
  .entry-row .d{ font-family:'IBM Plex Mono', monospace; width: 60px; flex-shrink:0; color: var(--ink); }
  .entry-dot{ width:9px; height:9px; border-radius:50%; flex-shrink:0; }

  details > summary{
    cursor:pointer; font-size: 12.5px; color: var(--ink-soft); font-family:'IBM Plex Mono', monospace;
    letter-spacing: 0.02em; list-style: none; user-select: none;
  }
  details > summary::-webkit-details-marker{ display:none; }
  details > summary::before{ content: '▸ '; }
  details[open] > summary::before{ content: '▾ '; }

  .danger-zone{ margin-top: 26px; padding-top: 16px; border-top: 1px dashed var(--line); }
  .reset-link{ font-size: 12px; color: var(--brick); text-decoration: underline; cursor:pointer; background:none; border:none; font-family: inherit; padding:0; }
  .loading{ text-align:center; padding: 40px 0; color: var(--ink-soft); font-family:'IBM Plex Mono', monospace; font-size: 13px; }

  .toast{
    position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--paper); font-family:'IBM Plex Mono', monospace; font-size: 12.5px;
    padding: 9px 16px; border-radius: 20px; opacity: 0; transition: all .25s ease; pointer-events:none; z-index: 50;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width:520px){
    h1{ font-size: 27px; }
    .card{ padding: 20px 16px; }
    .form-grid{ grid-template-columns: 1fr; }
    .dot{ width: 28px; height:28px; font-size: 10px; }
    .seg-btn{ min-width: 92px; padding: 9px 10px; }
    .seg-sub{ display:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Plano de força &amp; corrida — ciclo atual</p>
    <h1>Daily Balance</h1>
    <p class="sub">Upper/lower, 5 dias de força + corrida progressiva rumo aos 5&nbsp;km. Marque como está seu dia — o treino se ajusta com você, não contra você.</p>
  </header>

  <div id="cycleInfo"></div>
  <nav class="trail" id="trail"></nav>
  <div class="tabs-secondary">
    <button class="tab-btn" id="tabPlano">Treino e Humor</button>
    <button class="tab-btn" id="tabPainel">Alimentação e Sono</button>
    <button class="tab-btn" id="tabDash">Progressão</button>
  </div>

  <main id="content" class="card">
    <div class="loading">carregando trilha…</div>
  </main>

</div>
<div class="toast" id="toast">salvo ✓</div>

<script>
(function(){
  // Armazenamento local — funciona em qualquer navegador, sem depender do Claude.
  // Guarda tudo no localStorage deste navegador/dispositivo específico.
  const STORAGE_PREFIX = 'dailybalance:';
  const storage = {
    async get(key){
      const raw = localStorage.getItem(STORAGE_PREFIX+key);
      if (raw === null) throw new Error('not found: '+key);
      return { key, value: raw };
    },
    async set(key, value){
      localStorage.setItem(STORAGE_PREFIX+key, value);
      return { key, value };
    },
    async delete(key){
      localStorage.removeItem(STORAGE_PREFIX+key);
      return { key, deleted:true };
    },
    async list(prefix){
      const keys = [];
      const p = STORAGE_PREFIX + (prefix||'');
      for (let i=0;i<localStorage.length;i++){
        const k = localStorage.key(i);
        if (k && k.startsWith(p)) keys.push(k.slice(STORAGE_PREFIX.length));
      }
      return { keys };
    }
  };

  const DIAS = [
    { key:'seg', label:'Seg', title:'Inferior A', focus:'Quadríceps / Glúteo', type:'treino',
      essenciais:[
        {n:'Leg Press 45°', s:'4×10–12'},
        {n:'Cadeira Extensora', s:'3×12–15'},
        {n:'Cadeira Abdutora', s:'3×15'}
      ],
      complementares:[
        {n:'Agachamento no Smith', s:'3×10–12'},
        {n:'Panturrilha no Leg Press', s:'3×15–20'}
      ]
    },
    { key:'ter', label:'Ter', title:'Superior A · Push', focus:'Peito / Ombro / Tríceps', type:'treino', cardio:'Cardio leve 15–20 min (esteira ou elíptico, ritmo de conversa)',
      essenciais:[
        {n:'Supino Máquina', s:'4×10–12'},
        {n:'Desenvolvimento Máquina', s:'3×10–12'},
        {n:'Tríceps Corda (polia)', s:'3×12–15'}
      ],
      complementares:[
        {n:'Peck Deck', s:'3×12–15'},
        {n:'Elevação Lateral', s:'3×15'}
      ]
    },
    { key:'qua', label:'Qua', title:'Inferior B', focus:'Posterior de coxa / Glúteo — prioritário', type:'treino',
      essenciais:[
        {n:'Mesa Flexora', s:'4×10–12'},
        {n:'Cadeira Flexora', s:'3×12–15'},
        {n:'Elevação Pélvica (Hip Thrust)', s:'4×10–12'}
      ],
      complementares:[
        {n:'Stiff na Polia/Máquina', s:'3×10–12'},
        {n:'Coice na Polia (glúteo)', s:'3×15'}
      ]
    },
    { key:'qui', label:'Qui', title:'Superior B · Pull', focus:'Costas / Bíceps', type:'treino',
      essenciais:[
        {n:'Puxada Frontal (pulley)', s:'4×10–12'},
        {n:'Remada Máquina', s:'4×10–12'},
        {n:'Rosca Direta (máquina/polia)', s:'3×12–15'}
      ],
      complementares:[
        {n:'Remada Baixa (triângulo)', s:'3×12'},
        {n:'Rosca Martelo (halteres leves)', s:'3×12–15'}
      ]
    },
    { key:'sex', label:'Sex', title:'Inferior C', focus:'Glúteo / Unilateral', type:'treino',
      essenciais:[
        {n:'Afundo no Smith ou Passada', s:'3×10 cada perna'},
        {n:'Cadeira Abdutora', s:'4×15–20'},
        {n:'Elevação Pélvica Unilateral', s:'3×10–12 cada lado'}
      ],
      complementares:[
        {n:'Step-up na Plataforma', s:'3×10 cada perna'},
        {n:'Panturrilha Unilateral', s:'3×15'}
      ]
    },
    { key:'sab', label:'Sáb', title:'Corrida principal', focus:'Progressão rumo aos 5 km', type:'corrida',
      texto:'Ritmo de conversa (dá pra falar frases inteiras sem ofegar). Avance a distância ou o tempo de corrida contínua aos poucos — só suba o volume quando a semana atual estiver confortável. Se vier cansaço acumulado da semana de força, priorize terminar no ritmo certo, não na distância.'
    },
    { key:'dom', label:'Dom', title:'Descanso total', focus:'Recuperação', type:'descanso',
      texto:'Sem treino, sem culpa. Corpo constrói músculo no descanso — esse dia é parte do plano, não uma pausa nele.'
    }
  ];

  const TREINO_TEMPLATES = DIAS.filter(x => x.type === 'treino');

  const STATUS_NOTE = {
    verde: 'Energia boa hoje — vale o treino completo.',
    amarelo: 'Faça só os essenciais, reduza uma série se precisar. Já é suficiente.',
    vermelho: 'Hoje é recuperação. Descanse ou alongue leve — o treino te espera amanhã.'
  };

  // Plano alimentar prescrito pela nutricionista (ficha "Carbo alto", fev/2026)
  // meta diária ~1760 kcal — leve superávit calórico
  // meta diária ~1850 kcal — leve superávit calórico, recalculado para 47,5kg

  const RUN_WEEKLY_GROWTH = 1.10; // regra dos 10% — aumento seguro de distância por semana de corrida

  function getLongestComfortableRun(){
    let longest = 0;
    Object.keys(checkins).forEach(iso => {
      const c = checkins[iso];
      if (c && c.corrida && c.corrida.conversa && c.corrida.km) {
        longest = Math.max(longest, parseFloat(c.corrida.km));
      }
    });
    if (longest > 0) return longest;
    return parseFloat(config.corridaBaseKm) || 1;
  }

  function runProjection(){
    const longest = getLongestComfortableRun();
    return RUN_GOALS.map(goal => {
      if (longest >= goal) return { goal, reached:true, sessions:0, weeks:0 };
      const sessions = Math.ceil(Math.log(goal/longest) / Math.log(RUN_WEEKLY_GROWTH));
      return { goal, reached:false, sessions, weeks: sessions }; // 1 corrida/semana
    });
  }

  function getCyclePhase(){
    if (!config.cycleLastStart) return null;
    const start = new Date(config.cycleLastStart+'T00:00:00');
    const now = new Date(todayISO+'T00:00:00');
    const diffDays = Math.floor((now-start)/(1000*60*60*24));
    const length = parseFloat(config.cycleLength) || 28;
    let dayInCycle = (diffDays % length) + 1;
    if (dayInCycle <= 0) dayInCycle += length;
    const ratio = length/28;
    const menstrualEnd = 5*ratio, follicularEnd = 13*ratio, ovulationEnd = 16*ratio;
    let phase;
    if (dayInCycle <= menstrualEnd) phase = { label:'Menstrual', note:'Energia física costuma estar mais baixa — é normal precisar de mais descanso e reduzir a intensidade se fizer sentido.', color:'var(--brick)' };
    else if (dayInCycle <= follicularEnd) phase = { label:'Folicular', note:'Estrogênio sobe — costuma vir mais disposição e facilidade pra treinar.', color:'var(--moss)' };
    else if (dayInCycle <= ovulationEnd) phase = { label:'Ovulação', note:'Pico de energia e força na maioria dos ciclos — bom momento pra treinos mais puxados.', color:'var(--teal)' };
    else phase = { label:'Lútea', note:'Progesterona sobe e cai — é comum energia e humor oscilarem mais, principalmente nos últimos dias antes do período.', color:'var(--ochre)' };
    return { dayInCycle: Math.round(dayInCycle), length, phase };
  }

  function getDateForDayKey(dayKey){
    const idx = DAY_KEY_ORDER.indexOf(dayKey); // 0=segunda ... 6=domingo
    const now = new Date();
    const nowDow = now.getDay(); // 0=domingo
    const mondayOffset = (nowDow===0) ? -6 : 1-nowDow;
    const monday = new Date(now); monday.setDate(now.getDate()+mondayOffset);
    const target = new Date(monday); target.setDate(monday.getDate()+idx);
    return target.toISOString().slice(0,10);
  }

  function weekDates(){
    const arr = [];
    const now = new Date();
    for (let i=6;i>=0;i--){
      const dt = new Date(now); dt.setDate(now.getDate()-i);
      arr.push(dt.toISOString().slice(0,10));
    }
    return arr;
  }

  function monthDates(){
    const arr = [];
    const now = new Date();
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    for (let dt = new Date(first); dt <= now; dt.setDate(dt.getDate()+1)){
      arr.push(new Date(dt).toISOString().slice(0,10));
    }
    return arr;
  }

  function computeStats(dates){
    let pesos = [], sonos = [], energias = [], kcals = [], waters = [], moods = [];
    let sonoSeries = [], kcalSeries = [], moodSeries = [], statusSeries = [];
    let verde=0, amarelo=0, vermelho=0, treinoDias=0, registrados=0;
    dates.forEach(iso => {
      const wd = new Date(iso+'T00:00:00').getDay();
      if (wd>=1 && wd<=5) treinoDias++; // seg-sex = dias de treino previstos
      const st = statusMap[iso];
      statusSeries.push({iso, st: st||null});
      if (st==='verde') verde++;
      else if (st==='amarelo') amarelo++;
      else if (st==='vermelho') vermelho++;
      if (checkins[iso]) {
        registrados++;
        const c = getDay(iso);
        if (c.peso) pesos.push({iso, v:parseFloat(c.peso)});
        if (c.sono) { sonos.push(parseFloat(c.sono)); sonoSeries.push({iso, v:parseFloat(c.sono)}); }
        if (c.energia) energias.push(parseInt(c.energia));
        const kc = dayTotalKcal(c);
        if (kc>0) { kcals.push(kc); kcalSeries.push({iso, v:kc}); }
        if (c.water && c.water.count>0) waters.push(c.water.count);
        if (c.humor && c.humor.mood) { moods.push(c.humor.mood); moodSeries.push({iso, v:c.humor.mood}); }
      }
    });
    const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length) : null;
    return {
      pesoAvg: avg(pesos.map(p=>p.v)), pesoSeries: pesos,
      sonoAvg: avg(sonos), sonoSeries,
      energiaAvg: avg(energias),
      kcalAvg: avg(kcals), kcalSeries,
      waterAvg: avg(waters),
      moodAvg: avg(moods), moodSeries,
      statusSeries,
      verde, amarelo, vermelho, treinoDias, registrados, totalDias: dates.length
    };
  }

  function sparklineSvg(series){
    if (series.length < 2) return '<p class="hint" style="margin:6px 0 0;">Registre o peso em pelo menos 2 dias do mês para ver a tendência aqui.</p>';
    const w = 320, h = 64, pad = 6;
    const vals = series.map(p=>p.v);
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = (max-min) || 1;
    const stepX = (w - pad*2) / (series.length-1);
    const pts = series.map((p,i)=>{
      const x = pad + i*stepX;
      const y = h - pad - ((p.v-min)/range)*(h-pad*2);
      return [x,y];
    });
    const path = pts.map((p,i)=> (i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const last = pts[pts.length-1];
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; margin-top:8px;">
      <path d="${path}" fill="none" stroke="var(--teal)" stroke-width="2"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="var(--teal)"/>
    </svg>`;
  }

  function calendarGridSvg(dates){
    const first = new Date(dates[0]+'T00:00:00');
    const dow = first.getDay();
    const mondayIndex = (dow===0) ? 6 : dow-1;
    const cell=28, gap=4, cols=7;
    const totalCells = mondayIndex + dates.length;
    const rows = Math.ceil(totalCells/cols);
    const w = cols*(cell+gap)-gap, h = rows*(cell+gap)-gap;
    let rects = '';
    dates.forEach((iso,i)=>{
      const pos = mondayIndex+i;
      const col = pos%cols, row = Math.floor(pos/cols);
      const x = col*(cell+gap), y = row*(cell+gap);
      const st = statusMap[iso];
      const fill = st==='verde'?'var(--moss)':st==='amarelo'?'var(--ochre)':st==='vermelho'?'var(--brick)':'var(--paper-2)';
      const isToday = iso===todayISO;
      const dayNum = parseInt(iso.slice(8,10));
      rects += `<rect x="${x}" y="${y}" width="${cell}" height="${cell}" rx="5" fill="${fill}" ${isToday?'stroke="var(--teal)" stroke-width="2"':''}/><text x="${x+cell/2}" y="${y+cell/2+3}" font-size="9" text-anchor="middle" fill="${st?'#fff':'var(--ink-soft)'}" font-family="IBM Plex Mono, monospace">${dayNum}</text>`;
    });
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; max-width:340px; height:auto; margin-top:8px;">${rects}</svg>`;
  }

  function weeklyTrainingBarSvg(dates){
    const weeks = {};
    dates.forEach(iso=>{
      const dt = new Date(iso+'T00:00:00');
      const dow = dt.getDay();
      const mondayIndex = (dow===0)?6:dow-1;
      const weekStart = new Date(dt); weekStart.setDate(dt.getDate()-mondayIndex);
      const key = weekStart.toISOString().slice(0,10);
      if (!weeks[key]) weeks[key] = { total:0, done:0 };
      if (dow>=1 && dow<=5) weeks[key].total++;
      const st = statusMap[iso];
      if (st==='verde' || st==='amarelo') weeks[key].done++;
    });
    const keys = Object.keys(weeks).sort();
    if (!keys.length) return '<p class="hint" style="margin:6px 0 0;">Sem dados suficientes ainda.</p>';
    const w=320, h=100, pad=26;
    const maxTotal = Math.max(...keys.map(k=>weeks[k].total), 1);
    const slot = (w-pad*2)/keys.length;
    const barW = slot*0.55;
    let bars = '';
    keys.forEach((k,i)=>{
      const wk = weeks[k];
      const x = pad + i*slot + (slot-barW)/2;
      const barH = wk.total ? (h-pad*2) * (wk.total/maxTotal) : 2;
      const pct = wk.total ? wk.done/wk.total : 0;
      const doneH = barH*pct;
      const y = h-pad-barH;
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="3" fill="var(--paper-2)"/>
        <rect x="${x}" y="${y+barH-doneH}" width="${barW}" height="${doneH}" rx="3" fill="var(--teal)"/>
        <text x="${x+barW/2}" y="${h-8}" font-size="9" text-anchor="middle" fill="var(--ink-soft)" font-family="IBM Plex Mono, monospace">S${i+1}</text>
        <text x="${x+barW/2}" y="${y-5}" font-size="9" text-anchor="middle" fill="var(--ink-soft)" font-family="IBM Plex Mono, monospace">${wk.done}/${wk.total}</text>`;
    });
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; margin-top:8px;">${bars}</svg>`;
  }

  function kcalBarSvg(series, goal){
    if (!series.length) return '<p class="hint" style="margin:6px 0 0;">Sem registros de calorias neste período.</p>';
    const w=340, h=100, pad=20;
    const vals = series.map(p=>p.v);
    const max = Math.max(...vals, goal||0) * 1.1;
    const slot = (w-pad*2)/series.length;
    const barW = Math.max(slot*0.6, 2);
    let bars = '';
    series.forEach((p,i)=>{
      const x = pad + i*slot + (slot-barW)/2;
      const barH = (h-pad*2) * (p.v/max);
      const y = h-pad-barH;
      const over = goal && p.v>goal;
      bars += `<rect x="${x}" y="${y}" width="${barW}" height="${barH}" rx="2" fill="${over?'var(--ochre)':'var(--teal)'}"/>`;
    });
    let goalLine = '';
    if (goal){
      const gy = h-pad-(h-pad*2)*(goal/max);
      goalLine = `<line x1="${pad}" y1="${gy}" x2="${w-pad}" y2="${gy}" stroke="var(--brick)" stroke-width="1" stroke-dasharray="3,3"/>`;
    }
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; margin-top:8px;">${bars}${goalLine}</svg>`;
  }

  function sonoLineSvg(series){
    if (series.length < 2) return '<p class="hint" style="margin:6px 0 0;">Registre o sono em pelo menos 2 dias para ver a linha aqui.</p>';
    const w=320, h=64, pad=8;
    const vals = series.map(p=>p.v);
    const min = Math.min(...vals,5), max = Math.max(...vals,9);
    const range = (max-min) || 1;
    const stepX = (w-pad*2)/(series.length-1);
    const pts = series.map((p,i)=>{
      const x = pad+i*stepX;
      const y = h-pad-((p.v-min)/range)*(h-pad*2);
      return [x,y];
    });
    const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const last = pts[pts.length-1];
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; margin-top:8px;">
      <path d="${path}" fill="none" stroke="var(--teal)" stroke-width="2"/>
      <circle cx="${last[0]}" cy="${last[1]}" r="3.5" fill="var(--teal)"/>
    </svg>`;
  }

  function moodLineSvg(series){
    if (series.length < 2) return '<p class="hint" style="margin:6px 0 0;">Registre o humor em pelo menos 2 dias para ver a linha aqui.</p>';
    const w=320, h=64, pad=8;
    const stepX = (w-pad*2)/(series.length-1);
    const pts = series.map((p,i)=>{
      const x = pad+i*stepX;
      const y = h-pad-((p.v-1)/4)*(h-pad*2);
      return [x,y,p.v];
    });
    const path = pts.map((p,i)=>(i===0?'M':'L')+p[0].toFixed(1)+','+p[1].toFixed(1)).join(' ');
    const dots = pts.map(p=>{
      const m = MOOD_SCALE.find(m=>m.v===Math.round(p[2]));
      return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${m?m.color:'var(--teal)'}"/>`;
    }).join('');
    return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; margin-top:8px;">
      <path d="${path}" fill="none" stroke="var(--ink-soft)" stroke-width="1.5" opacity="0.5"/>${dots}
    </svg>`;
  }

  function renderDashboard(){
    const dates = monthDates();
    const stats = computeStats(dates);
    const goalKcal = parseInt(config.calorieGoal) || DEFAULT_KCAL_GOAL;
    const monthName = new Date().toLocaleDateString('pt-BR', { month:'long', year:'numeric' });
    const pesoSeries = stats.pesoSeries;

  function bottleSvg(){
    return `<svg viewBox="0 0 24 40" fill="currentColor"><rect x="9" y="0" width="6" height="5" rx="1"/><path d="M6 8h12v3.2c1.2.9 2 2.4 2 4.1V35a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4V15.3c0-1.7.8-3.2 2-4.1V8Z" fill-opacity="0.18" stroke="currentColor" stroke-width="1.4"/><path d="M4.3 17H19.7V35a4 4 0 0 1-4 4H8.3a4 4 0 0 1-4-4V17Z"/></svg>`;
  }

  function extrasTotal(extras){
    return extras.items.reduce((sum,it)=> sum + it.k*it.qty, 0);
  }
  function activeOption(it, state){
    // retorna {baseQty, unit} da opção atualmente selecionada (previsto ou substituto)
    if (state.sel && state.sel > 0) {
      const sub = it.subs[state.sel - 1];
      return sub ? { baseQty: sub.baseQty, unit: sub.unit } : { baseQty: it.baseQty, unit: it.unit };
    }
    return { baseQty: it.baseQty, unit: it.unit };
  }
  function getItemState(d, it){
    const raw = d.plan[it.id];
    if (raw && typeof raw === 'object') return raw;
    if (typeof raw === 'boolean') return { done: raw, qty: it.baseQty || 0, sel: 0 };
    return { done: false, qty: it.baseQty || 0, sel: 0 };
  }
  function itemKcal(it, state){
    if (!state.done) return 0;
    const opt = activeOption(it, state);
    if (!opt.baseQty) return it.k; // item livre ou substituto sem quantidade definida (ex: "equivalente")
    return Math.round(it.k * (state.qty / opt.baseQty));
  }
  function planItemsChecked(d){
    let n = 0;
    MEAL_PLAN.forEach(m => m.items.forEach(it => { if (getItemState(d,it).done) n++; }));
    return n;
  }
  function planItemsTotal(){
    let n = 0;
    MEAL_PLAN.forEach(m => n += m.items.length);
    return n;
  }
  function mealExtraTotal(d, mealKey){
    const items = (d.mealExtras && d.mealExtras[mealKey]) || [];
    return items.reduce((s,it)=> s + it.k*it.qty, 0);
  }
  function dayTotalKcal(d){
    let total = 0;
    MEAL_PLAN.forEach(m => {
      m.items.forEach(it => { total += itemKcal(it, getItemState(d,it)); });
      total += mealExtraTotal(d, m.key);
    });
    total += extrasTotal(d.extras);
    return total;
  }

    if (btnAdd) btnAdd.onclick = async () => {
      const nomeInput = document.getElementById('fMealExtraNome-'+m.key);
      const kcalInput = document.getElementById('fMealExtraKcal-'+m.key);
      const nome = nomeInput.value.trim();
      const kcal = parseInt(kcalInput.value);
      if (!nome || !kcal) return;
      if (!today.mealExtras[m.key]) today.mealExtras[m.key] = [];
      today.mealExtras[m.key].push({ n: nome, k: kcal, qty: 1 });
      await saveDay(todayISO);
      toast();
      render();
    };
  }

  function renderExtrasCard(today){
    const wrap = document.getElementById('extrasWrap');
    const extras = today.extras;
    const card = document.createElement('div');
    card.className = 'meal-card';
    card.innerHTML = `
      <div class="meal-head"><span class="meal-title">Beliscos / itens extras</span><span class="meal-kcal">${extrasTotal(extras)} kcal</span></div>
      <div class="chips">${FOOD_DB.map((f,idx)=>`<button class="chip" data-idx="${idx}">${f.n} · ${f.u} · ${f.k}kcal</button>`).join('')}</div>
      <div class="item-list">${extras.items.map((it,i)=>`
        <div class="item-row">
          <span class="item-name">${it.n}${it.qty>1 ? ' ×'+it.qty : ''}</span>
          <span class="item-kcal">${it.k*it.qty} kcal</span>
          <button class="item-x" data-i="${i}" title="remover">×</button>
        </div>`).join('') || '<p class="hint" style="margin:0;">Nada fora do plano hoje.</p>'}
      </div>
      <div class="custom-add">
        <input type="text" class="iname" placeholder="outro alimento...">
        <input type="number" class="ikcal" placeholder="kcal">
        <button class="btnAddCustom">adicionar</button>
      </div>
      <div class="obs-field"><input type="text" class="iobs" placeholder="observação (opcional)" value="${extras.obs||''}"></div>
    `;
    wrap.appendChild(card);

    card.querySelectorAll('.chip').forEach(chip => {
      chip.onclick = async () => {
        const f = FOOD_DB[parseInt(chip.dataset.idx)];
        const existing = extras.items.find(it => it.n === f.n && it.k === f.k);
        if (existing) existing.qty += 1;
        else extras.items.push({ n: f.n, k: f.k, qty: 1 });
        await saveDay(todayISO);
        toast();
        render();
      };
    });
    card.querySelectorAll('.item-x').forEach(btn => {
      btn.onclick = async () => {
        extras.items.splice(parseInt(btn.dataset.i), 1);
        await saveDay(todayISO);
        toast();
        render();
      };
    });
    card.querySelector('.btnAddCustom').onclick = async () => {
      const nameInput = card.querySelector('.iname');
      const kcalInput = card.querySelector('.ikcal');
      const name = nameInput.value.trim();
      const kcal = parseInt(kcalInput.value);
      if (!name || !kcal) return;
      extras.items.push({ n: name, k: kcal, qty: 1 });
      await saveDay(todayISO);
      toast();
      render();
    };
    card.querySelector('.iobs').onchange = async (e) => {
      extras.obs = e.target.value;
      await saveDay(todayISO);
      toast();
    };
  }

  function renderEntries(datesRange){
    const box = document.getElementById('entriesWrap');
    const recent = datesRange.slice().reverse().filter(iso => checkins[iso]).slice(0,10);
    if (recent.length === 0) {
      box.innerHTML = `<p class="hint">Ainda sem registros neste período.</p>`;
      return;
    }
    box.innerHTML = recent.map(iso => {
      const c = getDay(iso);
      const st = statusMap[iso];
      const dotColor = st==='verde' ? 'var(--moss)' : st==='amarelo' ? 'var(--ochre)' : st==='vermelho' ? 'var(--brick)' : 'var(--line)';
      const dstr = iso.slice(8,10)+'/'+iso.slice(5,7);
      const kc = dayTotalKcal(c);
      const wl = c.water ? (c.water.count*0.8).toFixed(1) : '0.0';
      return `<div class="entry-row">
        <span class="d">${dstr}</span>
        <span class="entry-dot" style="background:${dotColor}"></span>
        <span>${c.peso? c.peso+'kg · ':''}${c.sono? c.sono+'h sono · ':''}${c.energia? 'energia '+c.energia+' · ':''}${kc>0? kc+'kcal · ':''}${wl}L${c.dores? ' · '+c.dores : ''}</span>
      </div>`;
    }).join('');
  }

  function render(){
    renderTrail();
    document.getElementById('tabPlano').classList.toggle('active', currentTab==='plano');
    document.getElementById('tabPainel').classList.toggle('active', currentTab==='painel');
    document.getElementById('tabDash').classList.toggle('active', currentTab==='dash');
    const cycleEl = document.getElementById('cycleInfo');
    if (currentTab === 'plano') {
      cycleEl.style.display = '';
      renderCycleBanner();
    } else {
      cycleEl.style.display = 'none';
    }
    if (currentTab === 'painel') {
      renderPainel();
    } else if (currentTab === 'dash') {
      renderDashboard();
    } else {
      renderDay(DIAS.find(d => d.key === currentDayKey));
    }
  }

  document.getElementById('tabPlano').onclick = () => { currentTab='plano'; currentDayKey = TODAY_KEY; render(); };
  document.getElementById('tabPainel').onclick = () => { currentTab='painel'; render(); };
  document.getElementById('tabDash').onclick = () => { currentTab='dash'; render(); };

  loadAll();
})();
</script>
</body>
</html>
